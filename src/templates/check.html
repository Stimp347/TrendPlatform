<!DOCTYPE html>
<html>
<head>
    <title>Просмотр данных</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .btn-custom {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
        
        .info-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-card">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1>📁 Просмотр данных</h1>
                    <p class="lead">Проверка собранных CSV файлов</p>
                </div>
                <div>
                    <a href="/" class="btn-custom">🏠 Главная</a>
                </div>
            </div>
        </div>
        
        <div class="info-card">
            <h3>📊 Просмотр данных ВКонтакте</h3>
            <p class="text-muted mb-4">Проверьте собранные посты, лайки и статистику</p>
            <a href="/check/vk" class="btn btn-primary btn-lg">
                🔍 Проверить данные VK
            </a>
        </div>
    </div>
</body>
</html>
